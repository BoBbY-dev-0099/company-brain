<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NexaFlow evidence to governed decision architecture</title>
  <desc id="desc">Slack, Alibaba Cloud OSS, and GitHub feed an immutable evidence ledger. Qwen compiles Reality Memory, a deterministic SAG checks current reality, and a human owner confirms the recommended action. No external action is executed by NexaFlow.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f2f5fa"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173b76"/>
      <stop offset="1" stop-color="#245da9"/>
    </linearGradient>
    <linearGradient id="memory" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#f5f9ff"/>
    </linearGradient>
    <linearGradient id="safe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#effaf3"/>
      <stop offset="1" stop-color="#f8fcf9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#20324d" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5b79a6"/>
    </marker>
    <style>
      .title { font: 700 32px Inter, ui-sans-serif, system-ui, sans-serif; fill: #142234; letter-spacing: -.7px; }
      .subtitle { font: 400 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #5d6b7b; }
      .eyebrow { font: 700 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #3265ad; letter-spacing: 1.8px; }
      .card-title { font: 700 19px Inter, ui-sans-serif, system-ui, sans-serif; fill: #17212b; }
      .card-copy { font: 400 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #536170; }
      .small { font: 600 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #657384; letter-spacing: .7px; }
      .badge { font: 700 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #ffffff; letter-spacing: .8px; }
      .callout-title { font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #173b76; }
      .callout-copy { font: 400 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #536170; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#canvas)"/>
  <path d="M0 120 H1600" stroke="#dedfe3" stroke-width="1"/>
  <text x="64" y="58" class="eyebrow">NEXAFLOW LIVE OPERATIONS CONSOLE</text>
  <text x="64" y="98" class="title">Evidence becomes governed memory before a company acts</text>
  <text x="64" y="126" class="subtitle">A real source event enters the ledger, Qwen explains what changed, and deterministic safety rules keep the final decision auditable.</text>

  <!-- Source lane -->
  <text x="70" y="166" class="eyebrow">01  REAL SOURCES</text>
  <g filter="url(#shadow)">
    <rect x="70" y="185" width="290" height="108" rx="18" fill="#fffdfa" stroke="#d8e0ec"/>
    <rect x="90" y="207" width="42" height="42" rx="12" fill="#fff0f0"/>
    <text x="111" y="234" text-anchor="middle" font-size="22">#</text>
    <text x="150" y="219" class="card-title">Slack incident</text>
    <text x="150" y="243" class="card-copy">Signed #ops-incidents event</text>
    <text x="150" y="265" class="small">OOM / pause promotion</text>

    <rect x="70" y="338" width="290" height="108" rx="18" fill="#fffdfa" stroke="#d8e0ec"/>
    <rect x="90" y="360" width="42" height="42" rx="12" fill="#eef5ff"/>
    <text x="111" y="387" text-anchor="middle" font-size="21" fill="#245da9">O</text>
    <text x="150" y="372" class="card-title">Alibaba Cloud OSS</text>
    <text x="150" y="396" class="card-copy">Private read-only runbook</text>
    <text x="150" y="418" class="small">24 MiB minimum</text>

    <rect x="70" y="491" width="290" height="108" rx="18" fill="#fffdfa" stroke="#d8e0ec"/>
    <rect x="90" y="513" width="42" height="42" rx="12" fill="#f1f3f6"/>
    <text x="111" y="540" text-anchor="middle" font-size="20" fill="#34455c">G</text>
    <text x="150" y="525" class="card-title">GitHub merged PR</text>
    <text x="150" y="549" class="card-copy">Signed allowlisted change</text>
    <text x="150" y="571" class="small">8 MiB effective value</text>
  </g>

  <!-- Evidence ledger -->
  <path d="M360 239 C390 239 390 386 430 386" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M360 392 H430" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M360 545 C390 545 390 494 430 494" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="430" y="306" class="eyebrow">02  EVIDENCE</text>
  <g filter="url(#shadow)">
    <rect x="430" y="330" width="260" height="220" rx="20" fill="#fffdfa" stroke="#b9cbe6"/>
    <rect x="430" y="330" width="260" height="12" rx="6" fill="url(#navy)"/>
    <text x="458" y="385" class="card-title">Immutable ledger</text>
    <text x="458" y="412" class="card-copy">Normalized records retain:</text>
    <text x="458" y="439" class="card-copy">source ID and URL</text>
    <text x="458" y="461" class="card-copy">excerpt and raw-payload hash</text>
    <text x="458" y="483" class="card-copy">timestamps, freshness, ACL scope</text>
    <rect x="458" y="507" width="142" height="24" rx="12" fill="#eaf3ff"/>
    <text x="529" y="523" text-anchor="middle" class="small" fill="#245da9">decision_ready</text>
  </g>

  <!-- Qwen memory -->
  <path d="M690 440 H760" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="760" y="306" class="eyebrow">03  QWEN MEMORY</text>
  <g filter="url(#shadow)">
    <rect x="760" y="330" width="270" height="220" rx="20" fill="url(#memory)" stroke="#a9c2e4"/>
    <rect x="760" y="330" width="270" height="12" rx="6" fill="#245da9"/>
    <text x="788" y="385" class="card-title">Reality Memory</text>
    <text x="788" y="412" class="card-copy">Qwen compiles source-backed</text>
    <text x="788" y="434" class="card-copy">claims with rationale and lineage.</text>
    <text x="788" y="469" class="card-copy">Active claims stay current.</text>
    <text x="788" y="491" class="card-copy">Conflicts become superseded or</text>
    <text x="788" y="513" class="card-copy">review_required, never erased.</text>
  </g>

  <!-- Decision gateway -->
  <path d="M1030 440 H1100" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1100" y="306" class="eyebrow">04  SAFETY GATE</text>
  <g filter="url(#shadow)">
    <rect x="1100" y="330" width="260" height="220" rx="20" fill="#fff8f7" stroke="#e3b8b6"/>
    <rect x="1100" y="330" width="260" height="12" rx="6" fill="#b94743"/>
    <text x="1128" y="385" class="card-title">SAG + MCP / REST</text>
    <text x="1128" y="412" class="card-copy">Deterministic predicates check</text>
    <text x="1128" y="434" class="card-copy">current memory and live context.</text>
    <rect x="1128" y="465" width="132" height="31" rx="15" fill="#b94743"/>
    <text x="1194" y="485" text-anchor="middle" class="badge">SUSPENDED</text>
    <text x="1128" y="521" class="small">24 MiB required / 8 MiB merged</text>
  </g>

  <!-- Human boundary -->
  <path d="M1360 440 H1400" fill="none" stroke="#7190bb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1400" y="306" class="eyebrow">05  HUMAN</text>
  <g filter="url(#shadow)">
    <rect x="1400" y="330" width="140" height="220" rx="20" fill="url(#safe)" stroke="#a8d2b8"/>
    <rect x="1400" y="330" width="140" height="12" rx="6" fill="#27755f"/>
    <text x="1422" y="385" class="card-title">Owner</text>
    <text x="1422" y="412" class="card-copy">Engineering</text>
    <text x="1422" y="432" class="card-copy">release owner</text>
    <text x="1422" y="469" class="card-copy">Review and</text>
    <text x="1422" y="489" class="card-copy">confirm.</text>
    <rect x="1422" y="512" width="96" height="22" rx="11" fill="#dff3e6"/>
    <text x="1470" y="527" text-anchor="middle" class="small" fill="#27755f">NO EXECUTION</text>
  </g>

  <!-- Trust boundary callouts -->
  <rect x="70" y="690" width="1470" height="126" rx="22" fill="#ffffff" fill-opacity=".72" stroke="#d8e0ec"/>
  <text x="100" y="727" class="eyebrow">THE GOVERNED BOUNDARY</text>
  <g>
    <rect x="100" y="750" width="400" height="40" rx="12" fill="#f7f3eb"/>
    <text x="120" y="775" class="callout-title">Evidence stays immutable</text>
    <text x="330" y="775" class="callout-copy">hash + freshness + scope</text>
    <rect x="550" y="750" width="430" height="40" rx="12" fill="#eef5ff"/>
    <text x="570" y="775" class="callout-title">Qwen explains; SAG decides</text>
    <text x="795" y="775" class="callout-copy">model + deterministic rule</text>
    <rect x="1030" y="750" width="480" height="40" rx="12" fill="#effaf3"/>
    <text x="1050" y="775" class="callout-title">Human confirms; systems remain untouched</text>
  </g>
</svg>
