# Company Brain bare-metal nginx site configuration for brain.veriflowai.me.
#
# Install this only after Certbot has issued the certificate paths below. The
# Docker deployment is the supported hackathon path and automates the initial
# webroot challenge; this file remains a documented systemd alternative.

upstream companybrain_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name brain.veriflowai.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name brain.veriflowai.me;

    ssl_certificate /etc/letsencrypt/live/brain.veriflowai.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain.veriflowai.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/company-brain/frontend/dist;
    index index.html;

    location = /mcp {
        return 308 /mcp/;
    }

    location = /mcp/sse {
        default_type application/json;
        return 410 '{"error":"MCP_LEGACY_SSE_DISABLED","migration":"Use /mcp/ with Streamable HTTP and X-Brain-Api-Key."}';
    }

    location /mcp/ {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        add_header X-Accel-Buffering no;
    }

    location = /stream {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
        proxy_read_timeout 180s;
    }

    location ~ ^/(attestation|audit|benchmark|brain|decisions|demo|events|integrations|integration-catalog|reality|sag|settings|sessions|source-connections|source-events|workflow-templates|workflow-runs|workflow-sources)(?:/|$) {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
        proxy_read_timeout 180s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
