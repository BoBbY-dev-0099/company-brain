# Company Brain — nginx site config
#
# Replace company-brain.example with your hostname. SSE endpoints (/stream and
# /mcp/sse) MUST disable proxy buffering or events will be batched up and the
# UI will appear frozen.

upstream companybrain_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name company-brain.example;

    # Static frontend (Vite build output).
    root /opt/company-brain/frontend/dist;
    index index.html;

    # SSE streams — no buffering, long timeouts, raw passthrough.
    location = /stream {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /mcp/sse {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Accel-Buffering no;
    }

    location /mcp/ {
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        add_header X-Accel-Buffering no;
    }

    # Everything else under /api goes to FastAPI (rewritten without the prefix
    # so the same routes used in dev with vite proxy keep working in prod).
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://companybrain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Clerk-Publishable-Key $http_x_clerk_publishable_key;
        proxy_set_header X-LLM-Config $http_x_llm_config;
        proxy_read_timeout 60s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
