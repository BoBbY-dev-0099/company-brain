# Shared backend proxy routes for the HTTP bootstrap and HTTPS servers.

location = /health {
    proxy_pass http://companybrain_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location = /mcp {
    return 308 /mcp/;
}

# The previous SSE endpoint did not provide request-scoped API-key enforcement.
# Production clients must use authenticated Streamable HTTP at /mcp/.
location = /mcp/sse {
    default_type application/json;
    return 410 '{"error":"MCP_LEGACY_SSE_DISABLED","migration":"Use /mcp/ with Streamable HTTP and X-Brain-Api-Key."}';
}

location /mcp/ {
    proxy_pass http://companybrain_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    add_header X-Accel-Buffering no;
}

location = /stream {
    proxy_pass http://companybrain_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
}

location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://companybrain_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
    proxy_read_timeout 180s;
}

# Direct API paths remain useful to webhooks, curl, and MCP-aware clients.
location ~ ^/(attestation|audit|benchmark|brain|decisions|demo|events|integrations|integration-catalog|reality|sag|settings|sessions|source-connections|source-events|workflow-templates|workflow-runs|workflow-sources)(?:/|$) {
    proxy_pass http://companybrain_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Brain-Api-Key $http_x_brain_api_key;
    proxy_read_timeout 180s;
}

location / {
    try_files $uri $uri/ /index.html;
}
