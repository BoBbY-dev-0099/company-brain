# HTTP bootstrap configuration for the Docker deployment.
#
# It intentionally serves the app over HTTP until a certificate exists so the
# ECS public IP remains usable while DNS is being delegated. The nginx startup
# selector replaces this file with the TLS configuration after Certbot issues
# /etc/letsencrypt/live/$DOMAIN/fullchain.pem.

upstream companybrain_backend {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    include /etc/nginx/companybrain/proxy-locations.conf;
}
