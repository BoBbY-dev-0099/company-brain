services:
  mongodb:
    image: mongo:7.0
    container_name: companybrain-mongo
    restart: unless-stopped
    # Bind loopback only — do not expose Mongo on the public ECS IP.
    ports:
      - "127.0.0.1:27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            rs.status().ok
          } catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}).ok
          }
        "
      interval: 10s
      timeout: 30s
      start_period: 20s
      retries: 30

  # ECS mimic: API + nginx (+ built frontend). Start with:
  #   docker compose --profile full up --build -d
  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: companybrain-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # directConnection without replicaSet avoids RS host advertisement issues
      # between the api container and the mongo service DNS name.
      MONGODB_URI: mongodb://mongodb:27017/companybrain?directConnection=true
      MONGODB_DB_NAME: companybrain
      HOST: 0.0.0.0
      PORT: "8000"
      # Set by deploy/deploy.sh from the checked-out Git commit. This is
      # returned by /demo/readiness so a screenshot can prove what is running.
      BUILD_SHA: ${BUILD_SHA:-unknown}
      AUDIT_PRIVATE_KEY_PATH: /opt/company-brain/secrets/audit_private.pem
      AUDIT_PUBLIC_KEY_PATH: /opt/company-brain/secrets/audit_public.pem
    volumes:
      - audit_secrets:/opt/company-brain/secrets
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: companybrain-source-worker
    restart: unless-stopped
    command: ["python", "-m", "backend.sources.worker"]
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/companybrain?directConnection=true
      MONGODB_DB_NAME: companybrain
      AUDIT_PRIVATE_KEY_PATH: /opt/company-brain/secrets/audit_private.pem
      AUDIT_PUBLIC_KEY_PATH: /opt/company-brain/secrets/audit_public.pem
    volumes:
      - audit_secrets:/opt/company-brain/secrets
    depends_on:
      mongodb:
        condition: service_healthy

  nginx:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: companybrain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mongodb_data:
  mongodb_config:
  audit_secrets:
