services:
  mongodb:
    image: mongo:7.0
    container_name: companybrain-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            rs.status().ok
          } catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}).ok
          }
        "
      interval: 10s
      timeout: 30s
      start_period: 20s
      retries: 30

volumes:
  mongodb_data:
  mongodb_config:
